<style>
*{

    padding:0;
    box-sizing:border-box;

}

body{

header{

h1{

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;

.section{
    background:#1a1a1a;
    padding:25px;
    margin-bottom:20px;
    border-radius:12px;

    box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.section h2{

}

.form-group{
    margin-bottom:15px;
}

label{

    margin-bottom:6px;

}

input, select, textarea{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #444;
    background:#222;
    color:white;
}

input:focus, textarea:focus, select:focus{
    outline:none;
    border-color:#ff7a00;
    box-shadow:0 0 5px rgba(255,122,0,0.4);
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.checkbox-group{
    display:flex;
    flex-direction:column;
    gap:8px;
    color:#ccc;
}

.btn{
    width:100%;
    padding:15px;
    background:#ff7a00;
    border:none;
    color:white;
    font-size:16px;
    border-radius:30px;
    cursor:pointer;
    margin-top:20px;
    transition:0.2s;
}

.btn:hover{

}

small{

    font-size:12px;
}

/* camera */
video{

    border-radius:12px;
    margin-bottom:10px;
}

img{
    width:100%;
    margin-top:10px;
    border-radius:12px;
    display:none;
}

footer{
    text-align:center;
    padding:20px;
    background:#000;
    color:#666;
    margin-top:20px;
    border-top:1px solid #222;
}
</style>
</head>

<script>
let stream;

// เปิดกล้อง
function startCamera(){
    const video = document.getElementById('video');

    navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
        stream = s;
        video.srcObject = stream;
    })
    .catch(err => {
        alert("เปิดกล้องไม่ได้: " + err);
    });
}

// ปิดกล้อง
function stopCamera(){
    const video = document.getElementById('video');

    if(stream){
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
        stream = null;
    }
}

// ถ่ายภาพ
function takePhoto(){
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const photoData = document.getElementById('photoData');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    const dataURL = canvas.toDataURL('image/png');

    preview.src = dataURL;
    preview.style.display = "block";

    photoData.value = dataURL;
}
</script>
