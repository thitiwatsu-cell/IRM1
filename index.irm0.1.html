<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRM Extra Property Management</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
background:#0d0d0d;
color:#fff;
overflow-x:hidden;
}

/* ================= HEADER ================= */
header{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,.9);
z-index:9999;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
}

.logo img{
height:60px;
}

.company-name{
font-size:24px;
color:#ff7a00;
font-weight:bold;
}

/* MENU DESKTOP */
.nav-menu{
display:flex;
gap:20px;
}

.nav-menu a{
color:#fff;
text-decoration:none;
}

/* HAMBURGER */
.menu-toggle{
display:none;
font-size:30px;
cursor:pointer;
color:#fff;
}

/* ================= HERO ================= */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:120px 20px;
background:url("CONDO.png") center/cover;
}

.hero-content{
background:rgba(0,0,0,.5);
padding:40px;
border-radius:20px;
max-width:900px;
width:100%;
}

.hero h1{
font-size:70px;
color:#ff7a00;
}

.hero h2{
font-size:28px;
}

.hero p{
margin-top:10px;
}

/* ================= SECTIONS ================= */
section{
padding:80px 20px;
}

.section-title{
text-align:center;
font-size:32px;
color:#ff7a00;
margin-bottom:30px;
}

/* ================= GRID ================= */
.about-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.about-image img{
width:100%;
border-radius:15px;
}

.services-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.service-card{
background:#1a1a1a;
padding:20px;
border-radius:15px;
text-align:center;
}

/* ================= CONTACT ================= */
.contact-box{
background:#1a1a1a;
padding:30px;
border-radius:15px;
max-width:700px;
margin:auto;
}

/* ================= MOBILE ================= */
@media(max-width:768px){

.nav-menu{
display:none;
flex-direction:column;
position:absolute;
top:70px;
right:0;
background:#111;
width:200px;
padding:20px;
}

.nav-menu.active{
display:flex;
}

.menu-toggle{
display:block;
}

.about-container{
grid-template-columns:1fr;
}

.services-grid{
grid-template-columns:1fr;
}

.hero h1{
font-size:40px;
}

.hero h2{
font-size:20px;
}

}

</style>
</head>

<body>

<header>
<div class="navbar">

<div class="logo">IRM Extra</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="nav-menu" id="navMenu">
<a href="#about">เกี่ยวกับเรา</a>
<a href="#services">บริการ</a>
<a href="#contact">ติดต่อ</a>
<a href="career.html">สมัครงาน</a>
</div>

</div>
</header>

<section class="hero">
<div class="hero-content">
<h1>IRM EXTRA</h1>
<h2>บริหารนิติบุคคลอย่างมืออาชีพ</h2>
<p>ดูแลโครงการให้มีประสิทธิภาพสูงสุด</p>
</div>
</section>

<section id="about">
<h2 class="section-title">เกี่ยวกับเรา</h2>
<div class="about-container">
<img src="CONDO.png">
<div>
<p>บริษัทบริหารนิติบุคคลครบวงจร</p>
</div>
</div>
</section>

<section id="services">
<h2 class="section-title">บริการ</h2>
<div class="services-grid">
<div class="service-card">คอนโด</div>
<div class="service-card">หมู่บ้าน</div>
<div class="service-card">บัญชี</div>
</div>
</section>

<section id="contact">
<h2 class="section-title">ติดต่อ</h2>
<div class="contact-box">
<p>โทร: 09-8105-6952</p>
<p>Email: info@irmextra.com</p>
</div>
</section>

<footer style="text-align:center;padding:20px;">
© 2026 IRM Extra
</footer>

<script>
function toggleMenu(){
document.getElementById("navMenu").classList.toggle("active");
}
</script>

</body>
</html>
