<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRM Extra Property Management</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
background:#0d0d0d;
color:white;
overflow-x:hidden;
padding-top:70px;
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,.85);
z-index:999;
}

/* ===== HERO ===== */
.hero{
min-height:60vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 15px;
}

/* ===== 🔥 FIX SLIDER ใหม่ ===== */
.about-image{
width:100%;
max-width:900px;
margin:auto;
overflow:hidden;
border-radius:15px;
}

/* 🔥 ใช้ flex แทน absolute */
.slider-track{
display:flex;
width:300%;
transition:transform 0.8s ease;
}

.slider-track img{
width:100%;
flex-shrink:0;
height:350px;
object-fit:cover;
display:block;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
.slider-track img{
height:220px;
}
}

</style>
</head>

<body>

<header>
IRM EXTRA
</header>

<section class="hero">
<h1>IRM EXTRA</h1>
</section>

<!-- ===== SLIDER ===== -->
<section>

<div class="about-image">

<div class="slider-track" id="track">
<img src="CONDO.png">
<img src="CONDO2.png">
<img src="CONDO3.png">
</div>

</div>

</section>

<script>

let index = 0;
const track = document.getElementById("track");
const total = 3;

setInterval(()=>{
index = (index + 1) % total;
track.style.transform = `translateX(-${index * 100}%)`;
},1500);

</script>

</body>
</html>
