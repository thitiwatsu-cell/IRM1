<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRM Extra Property Management</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

html,body{
width:100%;
height:auto;
overflow-x:hidden;
overflow-y:auto; /* 🔥 สำคัญ: บังคับให้ scroll ได้ */
scroll-behavior:smooth;
}

body{
background:#0d0d0d;
color:white;
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,.9);
backdrop-filter:blur(10px);
z-index:999;
border-bottom:1px solid rgba(255,122,0,.2);
}

/* ===== NAV ===== */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
flex-wrap:wrap;
}

.company-name{
font-size:20px;
font-weight:700;
color:#ff7a00;
}

.nav-menu{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.nav-menu a{
text-decoration:none;
color:white;
font-size:12px;
padding:6px 10px;
border-radius:20px;
background:rgba(255,255,255,0.05);
}

/* ===== 🔥 FIX หลัก: กัน header บัง + เปิด scroll flow ===== */
main{
padding-top:80px;
}

/* ===== HERO ===== */
.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),
url("CONDO.png");
background-size:cover;
background-position:center;
}

/* ===== CONTENT ===== */
.hero-content{
background:rgba(0,0,0,.5);
padding:25px;
border-radius:20px;
max-width:900px;
width:100%;
}

/* ===== TEXT ===== */
h1{
font-size:clamp(28px,8vw,80px);
color:#ff8c1a;
}

h2{
font-size:clamp(16px,4vw,32px);
}

p{
font-size:clamp(13px,3vw,18px);
}

/* ===== SECTION ===== */
section{
padding:80px 15px;
min-height:auto; /* 🔥 กัน lock scroll */
}

/* ===== MOBILE ===== */
@media(max-width:768px){

.navbar{
flex-direction:column;
align-items:flex-start;
}

main{
padding-top:100px;
}

}

</style>
</head>

<body>

<header>
<div class="navbar">
<div class="company-name">IRM<span style="color:white;">Extra</span></div>

<div class="nav-menu">
<a href="#about">เกี่ยวกับ</a>
<a href="#vision">วิสัยทัศน์</a>
<a href="#mission">พันธกิจ</a>
<a href="#services">บริการ</a>
<a href="#team">ทีมผู้บริหาร</a>
<a href="career.html">สมัครงาน</a>
</div>
</div>
</header>

<!-- 🔥 WRAP ทั้งหน้า -->
<main>

<section class="hero">
<div class="hero-content">
<h1>IRM EXTRA</h1>
<h2>เราดูแลทุกวัน<br>เพื่อให้โครงการน่าอยู่</h2>
<p>ผู้เชี่ยวชาญด้านการบริหารนิติบุคคลอาคารชุด และหมู่บ้านจัดสรร</p>
</div>
</section>

<section id="about">
<h2>เกี่ยวกับบริษัท</h2>
<p>บริษัทบริหารนิติบุคคลครบวงจร</p>
</section>

<section id="vision">
<h2>วิสัยทัศน์</h2>
<p>เป็นบริษัทบริหารทรัพย์สินระดับมืออาชีพ</p>
</section>

</main>

</body>
</html>
