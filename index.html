<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRM Extra Property Management</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

html,body{
width:100%;
overflow-x:hidden;
}

body{
background:#0d0d0d;
color:white;
}

/* ===== HEADER FIX (ตัวต้นเหตุ) ===== */
header{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,.85);
backdrop-filter:blur(10px);
z-index:999;
border-bottom:1px solid rgba(255,122,0,.2);
}

/* 🔥 FIX สำคัญ */
.navbar{
width:100%;
padding:10px 12px;
display:flex;
flex-wrap:wrap;   /* <<< สำคัญมาก */
gap:8px;
align-items:center;
justify-content:space-between;
}

/* 🔥 ลดการดัน */
.company-name{
font-size:20px;
font-weight:700;
color:#ff7a00;
white-space:nowrap;
flex-shrink:0;
}

/* 🔥 FIX NAV ไม่ล้น */
.nav-menu{
display:flex;
flex-wrap:wrap;   /* <<< FIX */
gap:6px;
max-width:100%;
}

.nav-menu a{
text-decoration:none;
color:white;
font-size:12px;
padding:5px 10px;
border-radius:20px;
background:rgba(255,255,255,0.05);
white-space:nowrap;
}

/* ===== HERO ===== */
.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:90px 15px 40px;
background:
linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.45)),
url("CONDO.png");
background-size:cover;
background-position:center;
}

.hero-content{
background:rgba(0,0,0,.5);
padding:25px;
border-radius:20px;
max-width:900px;
width:100%;
}

/* 🔥 กันตัวหนังสือระเบิด */
.hero h1{
font-size:clamp(28px,8vw,80px);
color:#ff8c1a;
}

.hero h2{
font-size:clamp(16px,4vw,32px);
}

.hero p{
font-size:clamp(13px,3vw,18px);
}

/* ===== SECTION ===== */
section{
padding:70px 15px;
max-width:100%;
}

.section-title{
text-align:center;
font-size:32px;
color:#ff7a00;
margin-bottom:30px;
}

/* ===== ABOUT FIX ===== */
.about-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.about-image{
height:300px;
position:relative;
overflow:hidden;
border-radius:15px;
}

/* ===== GRID SAFE ===== */
.services-grid,
.team-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
gap:15px;
}

/* ===== CARD ===== */
.service-card,
.team-card{
background:#1a1a1a;
padding:15px;
border-radius:15px;
text-align:center;
border:1px solid rgba(255,122,0,.2);
}

.team-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

/* ===== CONTACT ===== */
.contact-box{
max-width:100%;
margin:auto;
background:#1a1a1a;
padding:25px;
border-radius:15px;
text-align:center;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

.navbar{
flex-direction:column; /* 🔥 FIX หลัก */
align-items:flex-start;
}

.about-container{
grid-template-columns:1fr;
}

.section-title{
font-size:24px;
}

.hero-content{
padding:18px;
}

}

</style>
</head>

<body>

<header>
<div class="navbar">
<div class="company-name">IRM<span style="color:white;">Extra</span></div>

<div class="nav-menu">
<a href="#about">เกี่ยวกับ</a>
<a href="#vision">วิสัยทัศน์</a>
<a href="#mission">พันธกิจ</a>
<a href="#services">บริการ</a>
<a href="#team">ทีมผู้บริหาร</a>
<a href="career.html">สมัครงาน</a>
</div>
</div>
</header>

<section class="hero">
<div class="hero-content">
<h1>IRM EXTRA</h1>
<h2>เราดูแลทุกวัน<br>เพื่อให้โครงการน่าอยู่</h2>
<p>ผู้เชี่ยวชาญด้านการบริหารนิติบุคคลอาคารชุด และหมู่บ้านจัดสรร</p>
</div>
</section>

</body>
</html>
