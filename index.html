<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRM Extra Property Management</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

html,body{
overflow-x:hidden;
scroll-behavior:smooth;
height:auto;
}

/* 🔥 FIX หลัก */
body{
background:#0d0d0d;
color:white;
padding-top:70px; /* กัน header fixed ทับ */
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,.85);
backdrop-filter:blur(10px);
z-index:999;
border-bottom:1px solid rgba(255,122,0,.2);
}

/* ===== NAV ===== */
.navbar{
width:100%;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.company-name{
font-size:22px;
font-weight:700;
color:#ff7a00;
white-space:nowrap;
}

.nav-menu{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.nav-menu a{
text-decoration:none;
color:white;
font-size:12px;
padding:6px 10px;
border-radius:20px;
background:rgba(255,255,255,0.05);
}

/* ===== HERO ===== */
.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 15px;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),
url("CONDO.png");
background-size:cover;
background-position:center;
}

/* ===== HERO CONTENT ===== */
.hero-content{
background:rgba(0,0,0,.5);
padding:25px;
border-radius:20px;
max-width:900px;
width:100%;
}

/* ===== TEXT SAFE ===== */
.hero h1{
font-size:clamp(30px,8vw,80px);
color:#ff8c1a;
}

.hero h2{
font-size:clamp(18px,4vw,32px);
}

.hero p{
font-size:clamp(13px,3vw,18px);
}

/* ===== SECTION ===== */
section{
padding:80px 15px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

.navbar{
flex-direction:column;
align-items:flex-start;
}

body{
padding-top:100px;
}

}

</style>
</head>

<body>

<header>
<div class="navbar">
<div class="company-name">IRM<span style="color:white;">Extra</span></div>

<div class="nav-menu">
<a href="#about">เกี่ยวกับ</a>
<a href="#vision">วิสัยทัศน์</a>
<a href="#mission">พันธกิจ</a>
<a href="#services">บริการ</a>
<a href="#team">ทีมผู้บริหาร</a>
<a href="career.html">สมัครงาน</a>
</div>
</div>
</header>

<section class="hero">
<div class="hero-content">
<h1>IRM EXTRA</h1>
<h2>เราดูแลทุกวัน<br>เพื่อให้โครงการน่าอยู่</h2>
<p>ผู้เชี่ยวชาญด้านการบริหารนิติบุคคลอาคารชุด และหมู่บ้านจัดสรร</p>
</div>
</section>

</body>
</html>
