<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRM Extra Property Management</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

html,body{
overflow-x:hidden;
}

body{
background:#0d0d0d;
color:white;
padding-top:70px;
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,.85);
z-index:999;
}

/* ===== IMAGE FIX 🔥 ===== */
.about-image{
width:100%;
height:320px;
position:relative;
overflow:hidden;
border-radius:15px;
}

/* 🔥 สำคัญ: ต้องบังคับทุกภาพ */
.about-image img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;   /* กันล้น */
display:block;      /* กันช่องว่าง */
opacity:0;
transition:opacity .8s ease;
}

/* 🔥 ภาพที่แสดง */
.about-image img.active{
opacity:1;
}

/* ===== HERO (ย่อไว้) ===== */
.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 15px;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),
url("CONDO.png");
background-size:cover;
background-position:center;
}

.hero-content{
background:rgba(0,0,0,.5);
padding:25px;
border-radius:20px;
max-width:900px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
.about-image{
height:240px; /* ลดสูงเพื่อไม่ล้นมือถือ */
}
}

</style>
</head>

<body>

<header>
IRM EXTRA
</header>

<section class="hero">
<div class="hero-content">
<h1>IRM EXTRA</h1>
</div>
</section>

<section id="about">

<div class="about-image">
<img src="CONDO.png" class="slide active">
<img src="CONDO2.png" class="slide">
<img src="CONDO3.png" class="slide">
</div>

</section>

<script>
let index = 0;
const slides = document.querySelectorAll(".about-image img");

setInterval(()=>{
slides.forEach(s => s.classList.remove("active"));
slides[index].classList.add("active");
index = (index + 1) % slides.length;
},1500);
</script>

</body>
</html>
